services:
  db:
    image: postgres:13
    restart: unless-stopped
    hostname: db
    expose:
      - 5432
    ports:
      - ${DJANGO_POSTGRES_PORT:-65432}:5432
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    env_file:
      - ./.env
    volumes:
      - bridge_dev_db:/var/lib/postgresql/data/
volumes:
  bridge_dev_db:
