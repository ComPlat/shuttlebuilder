x-postgress-variables: &postgress-variables
  POSTGRES_DB: "${POSTGRES_DB:-postgres}"
  POSTGRES_USER: "${POSTGRES_USER:-postgres}"
  POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-q3opc3123§§!'urbn$5(#6}"

x-envs: &envs
  MODE: prod
  ALLOWED_HOST: "${ALLOWED_HOST}"
  ELN_URL: "${ELN_URL}"
  DJANGO_SUPERUSER_USERNAME: "${DJANGO_SUPERUSER_USERNAME}"
  DJANGO_SUPERUSER_EMAIL: "${DJANGO_SUPERUSER_EMAIL}"
  DJANGO_SUPERUSER_PASSWORD: "${DJANGO_SUPERUSER_PASSWORD}"
  POSTGRES_PORT: 5432
  POSTGRES_HOST: db
  EMAIL_PORT: "${EMAIL_PORT}"
  EMAIL_HOST: "${EMAIL_HOST}"
  EMAIL_HOST_USER: "${EMAIL_HOST_USER}"
  EMAIL_HOST_PASSWORD: "${EMAIL_HOST_PASSWORD}"

services:
  db:
    image: postgres:16
    restart: unless-stopped
    hostname: db
    expose:
      - 5432
    ports:
      - ${PROJECT_POSTGRES_PORT:-65432}:5432
    environment:
      <<: *postgress-variables
    volumes:
      - bridge_db:/var/lib/postgresql/data/
  web:
    image: mstarman/shuttlebuilder:0.2.17
    build: .
    restart: unless-stopped
    depends_on:
      - db
    environment:
      <<:
        - *envs
        - *postgress-variables
    ports:
      - ${PROJECT_WEB_PORT:-80}:80

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: asetvbj!nm345vawectr32
    ports:
      - "8080:80"
    depends_on:
      - db

  redis:
    image: redis:7-alpine
    container_name: django-redis
volumes:
  bridge_db:
